services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grantatlas
      POSTGRES_USER: grantatlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grantatlas-local-dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grantatlas -d grantatlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2026-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-grantatlas}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-grantatlas-local-minio-secret}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9001:9001"

  api:
    build:
      context: ./apps/api
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./apps/api
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    depends_on:
      - api
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=INFO

  web:
    build:
      context: ./apps/web
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_URL: ${WEB_BASE_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    env_file:
      - ${COMPOSE_ENV_FILE:-.env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - api

volumes:
  postgres-data:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
